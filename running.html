<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0C0C12" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Patron" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />

<title>Running · Chasing Legendary Status</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

<script>try{document.documentElement.setAttribute("data-theme",localStorage.getItem("patron_theme")||"nocturne");}catch(e){document.documentElement.setAttribute("data-theme","nocturne");}</script>

<link rel="stylesheet" href="theme.css" />

<style>
  .shell { max-width: 760px; }
  .stack { display:flex; flex-direction:column; gap: var(--space-4); }

  .weekBadge { display:inline-flex; align-items:center; gap:6px; font-family:var(--font-mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; padding:4px 10px; border-radius:var(--radius-pill); background:var(--brand-soft); border:1px solid var(--brand-line); color:var(--brand); }
  .weekBadge.deload { background:var(--warn-soft); border-color:var(--warn-line); color:var(--warn); }
  .weekBadge.muted { background:var(--surface); border-color:var(--border); color:var(--muted); }

  .planGrid { display:grid; grid-template-columns:1fr 1fr; gap: var(--space-3); margin-top: var(--space-4); }
  @media (max-width:560px) { .planGrid { grid-template-columns:1fr; } }
  .planBox { padding: var(--space-4); border:1px solid var(--border); border-radius: var(--radius-md); background: var(--surface); }
  .planBox .planLabel { font-family:var(--font-mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .planBox .planBody { font-size:14px; font-weight:600; line-height:1.4; }
  .planBox .planDay { font-family:var(--font-mono); font-size:11px; color:var(--brand); margin-top:6px; }

  .zoneRow { display:flex; gap:var(--space-2); flex-wrap:wrap; margin-top: var(--space-4); }
  .zoneChip { display:flex; flex-direction:column; gap:2px; padding:8px 12px; border-radius:var(--radius-md); background:var(--surface); border:1px solid var(--border); flex:1; min-width:120px; }
  .zoneChip .zN { font-family:var(--font-display); font-weight:600; font-size:var(--text-base); font-variant-numeric:tabular-nums; }
  .zoneChip .zL { font-family:var(--font-mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }

  .logForm { display:grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-3); align-items:end; }
  @media (max-width:560px) { .logForm { grid-template-columns: 1fr 1fr; } }
  .logField { display:flex; flex-direction:column; gap:4px; }
  .logField label { font-family:var(--font-mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
  .logSubmitRow { grid-column: 1 / -1; display:flex; gap:var(--space-3); align-items:center; }
  .logNotes { grid-column: 1 / -1; }

  .rowItem { display:flex; align-items:center; justify-content:space-between; gap:var(--space-3); padding:10px 0; border-bottom:1px solid var(--border); }
  .rowItem:last-child { border-bottom:0; }
  .rowMain { display:flex; flex-direction:column; gap:2px; min-width:0; }
  .rowName { font-weight:600; font-size:14px; }
  .rowMeta { font-family:var(--font-mono); font-size:11px; color:var(--muted); }
  .rowRight { display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .rowVal { font-family:var(--font-mono); font-weight:700; color:var(--brand); font-size:13px; white-space:nowrap; }
  .rowDel { appearance:none; background:transparent; border:0; color:var(--muted); font-size:18px; line-height:1; cursor:pointer; padding:4px 8px; border-radius:6px; }
  .rowDel:hover { color:var(--neg); }
  .rowEmpty { text-align:center; padding: var(--space-5) 0; color:var(--muted); font-size:13px; font-style:italic; }
  .typeTag { font-family:var(--font-mono); font-size:9px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:2px 7px; border-radius:var(--radius-pill); background:var(--brand-soft); color:var(--brand); }
  .typeTag.long { background:var(--pos-soft); color:var(--pos); }
  .typeTag.extra { background:var(--surface); color:var(--muted-strong); border:1px solid var(--border); }

  .weekProgress { display:flex; gap:6px; margin-top:var(--space-3); }
  .weekProgress .wp { flex:1; height:6px; border-radius:3px; background:var(--track); }
  .weekProgress .wp.done { background:var(--pos); }
</style>
</head>
<body>
<main class="page grain-overlay">
  <div class="shell">

    <header class="header">
      <div>
        <h1 class="title">Running</h1>
        <p class="subtitle">this week's plan · log your runs</p>
      </div>
      <div class="headerControls">
        <a class="backLink" href="index.html">← Dashboard</a>
        <span id="themeSeg"></span>
      </div>
    </header>

    <div id="app" class="stack"></div>

  </div>
</main>

<script src="theme.js"></script>
<script>
document.getElementById('themeSeg').innerHTML = Patron.switcherHtml();

/* ============================================================
 * Helpers
 * ============================================================ */
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function localDateKey(d){ d=d||new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtDateKey(k){ const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d).toLocaleDateString([], {weekday:'short', month:'short', day:'numeric'}); }
function parseTimeStr(s){
  const parts = String(s||'').trim().split(':').map(x=>Number(x));
  if (!parts.length || parts.some(x=>!isFinite(x))) return null;
  let secs = 0;
  for (const p of parts) secs = secs*60 + p;
  return secs > 0 ? secs : null;
}
function fmtTimeStr(totalSec){
  totalSec = Math.round(totalSec);
  const h = Math.floor(totalSec/3600), m = Math.floor((totalSec%3600)/60), s = totalSec%60;
  return h>0 ? h+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0') : m+':'+String(s).padStart(2,'0');
}
function fmtPace(minPerKm){
  if (minPerKm == null || !isFinite(minPerKm) || minPerKm<=0) return '—';
  const m = Math.floor(minPerKm), s = Math.round((minPerKm-m)*60);
  return m+':'+String(s).padStart(2,'0')+'/km';
}

/* ============================================================
 * 12-week program — same start date as gym.html's PROGRAM, kept as an
 * independent copy here since each page in the suite is self-contained.
 * ============================================================ */
const PROGRAM_START = '2026-07-06'; // Monday
const TOTAL_WEEKS = 12;

// Wednesday high-intensity session, by week.
const WED_PLAN = {
  1:'6×2min hard / 2min jog', 2:'5×3min hard / 2min jog', 3:'6×3min hard / 90s jog',
  4:'20min continuous easy (deload)',
  5:'8×400m interval / 90s jog', 6:'20min continuous tempo', 7:'5×1km threshold / 2min jog',
  8:'25min easy (deload)',
  9:'10×400m interval / 60–75s jog', 10:'25min tempo', 11:'6×800m interval / 2min jog',
  12:'5km all-out time trial (test)'
};
// Weekend long run target, by week.
const LONG_PLAN = {
  1:'7km easy', 2:'8km easy', 3:'9km easy', 4:'5km easy (deload)',
  5:'9km easy, last 1km moderate', 6:'10km easy', 7:'10km, last 2km moderate', 8:'6km easy (deload)',
  9:'10km, last 3km moderate', 10:'11km easy', 11:'10km + 3×5min surges at threshold', 12:'6–7km easy (deload/test)'
};
const DELOAD_WEEKS = [4, 8, 12];

function programWeekNumber(d){
  d = d || new Date();
  const start = new Date(PROGRAM_START + 'T00:00:00');
  const t = new Date(d); t.setHours(0,0,0,0); start.setHours(0,0,0,0);
  const days = Math.floor((t - start) / 86400000);
  if (days < 0) return 0;
  return Math.floor(days / 7) + 1;
}
function programWeekInfo(d){
  const wk = programWeekNumber(d);
  if (wk < 1) {
    const daysUntil = Math.ceil((new Date(PROGRAM_START + 'T00:00:00') - new Date()) / 86400000);
    return { status:'upcoming', week:0, daysUntil };
  }
  if (wk > TOTAL_WEEKS) return { status:'complete', week: TOTAL_WEEKS };
  return { status:'active', week: wk, deload: DELOAD_WEEKS.indexOf(wk) !== -1, wed: WED_PLAN[wk], long: LONG_PLAN[wk] };
}

/* ============================================================
 * Persisted state — manually logged runs.
 * ============================================================ */
const LS = 'running_standalone_v1';
function seed(){ return { version:1, runs:[] }; }
function load(){
  try {
    const r = localStorage.getItem(LS);
    const s = r ? Object.assign(seed(), JSON.parse(r)) : seed();
    if (!Array.isArray(s.runs)) s.runs = [];
    return s;
  } catch(e){ return seed(); }
}
function save(){ try{ localStorage.setItem(LS, JSON.stringify(state)); }catch(e){} }
let state = load();
const ui = { type:'interval', distance:'', time:'', notes:'', date: localDateKey() };

const TYPE_LABEL = { interval:'Wed Interval/Tempo', long:'Long Run', extra:'Extra' };

/* ============================================================
 * Views
 * ============================================================ */
function weekHeroHtml(){
  const info = programWeekInfo();
  let badge, body;
  if (info.status === 'upcoming') {
    badge = '<span class="weekBadge muted">starts in ' + info.daysUntil + (info.daysUntil===1?' day':' days') + '</span>';
    body = '<p class="cardTag" style="margin-top:var(--space-3)">Your 12-week hybrid program kicks off ' + new Date(PROGRAM_START+'T00:00:00').toLocaleDateString([], {weekday:'long', month:'short', day:'numeric'}) + '. This week\'s targets will appear here once it starts.</p>';
  } else if (info.status === 'complete') {
    badge = '<span class="weekBadge muted">program complete</span>';
    body = '<p class="cardTag" style="margin-top:var(--space-3)">All 12 weeks logged — nice work. Keep logging runs below, or start a new block in gym.html\'s PROGRAM config.</p>';
  } else {
    badge = '<span class="weekBadge' + (info.deload ? ' deload' : '') + '">week ' + info.week + '/' + TOTAL_WEEKS + (info.deload ? ' · deload' : '') + '</span>';
    body = '<div class="planGrid">'
      + '<div class="planBox"><div class="planLabel">Wed · High intensity</div><div class="planBody">' + esc(info.wed) + '</div></div>'
      + '<div class="planBox"><div class="planLabel">Weekend · Long run</div><div class="planBody">' + esc(info.long) + '</div></div>'
      + '</div>'
      + weekProgressHtml(info.week);
  }
  return '<section class="card"><span class="cardName">This week</span>' + badge
    + body
    + '<div class="zoneRow">'
    + '<div class="zoneChip"><span class="zN">6:15–6:45</span><span class="zL">Easy /km</span></div>'
    + '<div class="zoneChip"><span class="zN">5:25–5:40</span><span class="zL">Tempo/threshold /km</span></div>'
    + '<div class="zoneChip"><span class="zN">4:50–5:05</span><span class="zL">Interval /km</span></div>'
    + '</div></section>';
}
function weekProgressHtml(week){
  const runsThisWeek = state.runs.filter(r => runWeekNumber(r) === week);
  const doneInterval = runsThisWeek.some(r => r.type === 'interval');
  const doneLong = runsThisWeek.some(r => r.type === 'long');
  return '<div class="weekProgress"><div class="wp' + (doneInterval?' done':'') + '"></div><div class="wp' + (doneLong?' done':'') + '"></div></div>'
    + '<p class="cardTag" style="margin-top:6px">' + [doneInterval,doneLong].filter(Boolean).length + '/2 planned sessions logged this week</p>';
}
function runWeekNumber(run){
  return programWeekNumber(new Date(run.dateKey + 'T12:00:00'));
}

function logFormHtml(){
  const paceLbl = (function(){
    const d = Number(ui.distance), t = parseTimeStr(ui.time);
    if (!d || !t) return '';
    return '<span class="rowMeta">pace ' + fmtPace((t/60)/d) + '</span>';
  })();
  return '<section class="card"><span class="cardName">Log a run</span>'
    + '<form class="logForm" id="logForm" style="margin-top:var(--space-4)">'
    + '<div class="logField"><label for="f-date">Date</label><input id="f-date" class="fieldInput" type="date" value="' + esc(ui.date) + '"></div>'
    + '<div class="logField"><label for="f-type">Type</label><select id="f-type" class="fieldInput">'
    +   Object.keys(TYPE_LABEL).map(k => '<option value="' + k + '"' + (k===ui.type?' selected':'') + '>' + TYPE_LABEL[k] + '</option>').join('')
    + '</select></div>'
    + '<div class="logField"><label for="f-dist">Distance (km)</label><input id="f-dist" class="fieldInput" type="number" step="0.1" min="0" placeholder="10" value="' + esc(ui.distance) + '"></div>'
    + '<div class="logField"><label for="f-time">Time (mm:ss)</label><input id="f-time" class="fieldInput" type="text" placeholder="52:30" value="' + esc(ui.time) + '"></div>'
    + '<div class="logField logNotes"><label for="f-notes">Notes (optional)</label><input id="f-notes" class="fieldInput" type="text" placeholder="felt good, shoulder fine" value="' + esc(ui.notes) + '"></div>'
    + '<div class="logSubmitRow"><button type="submit" class="btn btn-primary">Log run</button>' + paceLbl + '</div>'
    + '</form></section>';
}

function runsListHtml(){
  const runs = state.runs.slice().sort((a,b)=> b.dateKey.localeCompare(a.dateKey) || (b.ts||0)-(a.ts||0));
  if (!runs.length) return '<section class="card"><span class="cardName">Recent runs</span><p class="rowEmpty">Nothing logged yet — add your first run above.</p></section>';
  const rows = runs.map((r,i) => {
    const pace = r.distanceKm && r.timeSec ? fmtPace((r.timeSec/60)/r.distanceKm) : null;
    return '<div class="rowItem"><div class="rowMain">'
      + '<span class="rowName"><span class="typeTag' + (r.type==='long'?' long':r.type==='extra'?' extra':'') + '">' + TYPE_LABEL[r.type] + '</span> ' + fmtDateKey(r.dateKey) + '</span>'
      + '<span class="rowMeta">' + r.distanceKm + 'km' + (r.timeSec ? ' · ' + fmtTimeStr(r.timeSec) : '') + (pace ? ' · ' + pace : '') + (r.notes ? ' · ' + esc(r.notes) : '') + '</span>'
      + '</div><div class="rowRight">'
      + '<button class="rowDel" data-del="' + r.id + '" aria-label="Remove">×</button>'
      + '</div></div>';
  }).join('');
  return '<section class="card"><span class="cardName">Recent runs</span><div style="margin-top:var(--space-2)">' + rows + '</div></section>';
}

function render(){
  document.getElementById('app').innerHTML = weekHeroHtml() + logFormHtml() + runsListHtml();
}

/* ============================================================
 * Events
 * ============================================================ */
document.addEventListener('input', e => {
  if (e.target.id === 'f-date') ui.date = e.target.value;
  else if (e.target.id === 'f-dist') { ui.distance = e.target.value; refreshPaceOnly(); }
  else if (e.target.id === 'f-time') { ui.time = e.target.value; refreshPaceOnly(); }
  else if (e.target.id === 'f-notes') ui.notes = e.target.value;
});
document.addEventListener('change', e => {
  if (e.target.id === 'f-type') ui.type = e.target.value;
});
function refreshPaceOnly(){
  // Re-render just the submit row's pace hint without losing input focus.
  const row = document.querySelector('.logSubmitRow');
  if (!row) return;
  const d = Number(ui.distance), t = parseTimeStr(ui.time);
  const existing = row.querySelector('.rowMeta');
  if (existing) existing.remove();
  if (d && t) row.insertAdjacentHTML('beforeend', '<span class="rowMeta">pace ' + fmtPace((t/60)/d) + '</span>');
}
document.addEventListener('submit', e => {
  if (e.target.id !== 'logForm') return;
  e.preventDefault();
  const dist = Number(ui.distance);
  const timeSec = parseTimeStr(ui.time);
  if (!ui.date) { alert('Pick a date.'); return; }
  if (!isFinite(dist) || dist <= 0) { alert('Enter a valid distance.'); return; }
  state.runs.push({
    id: Date.now() + '-' + Math.round(Math.random()*1e5),
    dateKey: ui.date, type: ui.type, distanceKm: dist,
    timeSec: timeSec || null, notes: ui.notes.trim(), ts: Date.now()
  });
  save();
  ui.distance = ''; ui.time = ''; ui.notes = ''; ui.date = localDateKey();
  render();
});
document.addEventListener('click', e => {
  const del = e.target.closest('[data-del]');
  if (del) {
    state.runs = state.runs.filter(r => String(r.id) !== del.getAttribute('data-del'));
    save();
    render();
  }
});
window.addEventListener('storage', e => { if (e.key === LS) { state = load(); render(); } });

render();
</script>
</body>
</html>
